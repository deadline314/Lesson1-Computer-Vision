<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>視覺模型基礎</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Gloria+Hallelujah&family=Kalam:wght@400;700&family=Patrick+Hand&family=Shippori+Mincho:wght@500;700;800&family=Noto+Serif+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="progress-bar" id="progressBar"></div>

<div class="container">
  <header>
    <div class="corner-decoration">
      第一堂課 / 共四堂<br>
      Vision 101
    </div>
    <h1 class="title">
      電腦怎麼<span class="highlight">看圖</span>?<br>
      <span class="scribble">從 CNN 到 YOLO 的奇幻旅程</span>
    </h1>
    <p class="subtitle">
      這是一本互動筆記本。十八個主題、多個互動玩具,慢慢操作就能搞懂這些模型在做什麼。
    </p>
    <div class="meta-row">
      <span class="meta-stamp">120 min</span>
      <span>📚 18 個互動 demo</span>
      <span>·</span>
      <span>🎯 從基礎到 YOLOv8</span>
      <span>·</span>
      <span>✏️ 作業:做一個自己的 YOLO</span>
    </div>
    <div class="help-banner">
      <span class="help-banner-icon">!</span>
      <span>看到 <span class="term" data-term="example">紅色波浪底線的字</span> 就把滑鼠移上去,有詳細解釋跟外部連結。慢慢來,不用一次看懂。</span>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-wrapper" id="tabsWrapper">
      <button class="tabs-scroll-btn left" id="tabScrollLeft" aria-label="Scroll tabs left">‹</button>
      <div class="tabs-inner" id="tabsInner">
        <button class="tab active" data-tab="intro"><span class="tab-icon">🎬</span>開場</button>
        <button class="tab" data-tab="conv"><span class="tab-icon">🎨</span>卷積 Conv</button>
        <button class="tab" data-tab="pool"><span class="tab-icon">🪟</span>池化 Pool</button>
        <button class="tab" data-tab="activation"><span class="tab-icon">⚡</span>激活函數</button>
        <button class="tab" data-tab="bn"><span class="tab-icon">📊</span>Batch Norm</button>
        <button class="tab" data-tab="fc"><span class="tab-icon">🔗</span>FC vs Conv</button>
        <button class="tab" data-tab="gradient"><span class="tab-icon">📉</span>梯度消失</button>
        <button class="tab" data-tab="residual"><span class="tab-icon">🔁</span>殘差學習</button>
        <button class="tab" data-tab="cnnhistory"><span class="tab-icon">📜</span>CNN 演進</button>
        <button class="tab" data-tab="optimizer"><span class="tab-icon">🏃</span>優化器</button>
        <button class="tab" data-tab="annealing"><span class="tab-icon">🌡️</span>模擬退火</button>
        <button class="tab" data-tab="augmentation"><span class="tab-icon">🎭</span>資料增強</button>
        <button class="tab" data-tab="yolo"><span class="tab-icon">🎯</span>YOLO Anchor</button>
        <button class="tab" data-tab="yoloevo"><span class="tab-icon">🚀</span>YOLO 演進</button>
        <button class="tab" data-tab="builder"><span class="tab-icon">🧱</span>模型組裝</button>
        <button class="tab" data-tab="forwardpass"><span class="tab-icon">▶️</span>Forward Pass</button>
        <button class="tab" data-tab="pytorch"><span class="tab-icon">🐍</span>PyTorch 實作</button>
        <button class="tab" data-tab="assignment"><span class="tab-icon">📝</span>作業說明</button>
      </div>
      <button class="tabs-scroll-btn right" id="tabScrollRight" aria-label="Scroll tabs right">›</button>
      <div class="tabs-scroll-hint">← 滑動看更多 tab →</div>
    </div>
  </nav>

  <div id="tab-container">
    <div class="tab-loading">載入中...</div>
  </div>
</div>

<div class="term-tip" id="termTip"></div>

<script src="js/terms.js"></script>
<script src="js/helpers.js"></script>
<script src="js/main.js"></script>
</body>
</html>
